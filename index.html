    <script>
        const validCodes = ['CATS', 'BOOKS'];
        
        document.getElementById('enter-btn').addEventListener('click', function() {
            const inputCode = document.getElementById('ticket-id').value.trim().toUpperCase();
            const errorMessage = document.getElementById('error-message');
            
            if (validCodes.includes(inputCode)) {
                document.getElementById('landing-screen').classList.remove('visible');
                setTimeout(() => {
                    document.getElementById('portals-screen').classList.add('visible');
                    
                    const cards = document.querySelectorAll('.portal-card');
                    cards.forEach((card, index) => {
                        setTimeout(() => {
                            card.classList.add('reveal');
                        }, index * 1000);
                    });
                }, 500); 
            } else {
                errorMessage.className = "error-visible";
            }
        });

        function enterGreatHall() {
            document.getElementById('portals-screen').classList.remove('visible');
            
            setTimeout(() => {
                document.getElementById('great-hall-screen').classList.add('visible');
                
                const grid = document.getElementById('mosaic-grid');
                grid.innerHTML = ''; 
                grid.classList.remove('reveal-portrait'); 
                
                const sessionPhotos = [];
                for (let i = 1; i <= 304; i++) {
                    sessionPhotos.push(i);
                }
                
                sessionPhotos.sort(() => Math.random() - 0.5);
                
                let index = 0;
                const targetCount = 304;
                
                const waterfall = setInterval(() => {
                    if (index >= targetCount) {
                        clearInterval(waterfall);
                        setTimeout(() => {
                            document.getElementById('assemble-btn').classList.add('show');
                        }, 500);
                        return;
                    }

                    const photoNumber = sessionPhotos[index];
                    const img = document.createElement('img');
                    img.className = 'mosaic-tile';
                    img.alt = `Memory ${photoNumber}`;
                    
                    img.loading = "lazy";
                    img.decoding = "async";

                    const randomX = (Math.random() * 120 - 60) + 'px';
                    const randomY = (Math.random() * 120 - 60) + 'px';
                    const randomRot = (Math.random() * 90 - 45) + 'deg';
                    
                    img.style.setProperty('--x', randomX);
                    img.style.setProperty('--y', randomY);
                    img.style.setProperty('--r', randomRot);
                    
                    grid.appendChild(img);

                    img.src = `archive/photo (${photoNumber}).jpg`;
                    
                    setTimeout(() => {
                        img.classList.add('scattered');
                    }, 10);

                    index++;
                }, 25); 

            }, 500);
        }

        function assembleMosaicWithCurtains() {
            const curtain = document.getElementById('theater-curtain');
            const btn = document.getElementById('assemble-btn');
            const grid = document.getElementById('mosaic-grid');
            const tiles = document.querySelectorAll('.mosaic-tile');

            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';
            curtain.classList.add('closed');

            setTimeout(() => {
                tiles.forEach(tile => {
                    tile.classList.remove('scattered');
                    tile.classList.add('assembled');
                });
                grid.classList.add('reveal-portrait');
            }, 1000); 

            setTimeout(() => {
                curtain.classList.remove('closed');
            }, 2500);
        }

    function enterAphroditeWing() {
        document.getElementById('portals-screen').classList.remove('visible');
        
        setTimeout(() => {
            document.getElementById('aphrodite-screen').classList.add('visible');
            
            setTimeout(() => {
                document.getElementById('pedestal-pillar').classList.add('rise');
            }, 1500);
            
            loadAphroditeGallery();
        }, 500);
        }

    let currentAphroditeIndex = 0;

    function loadAphroditeGallery() {
        const track = document.getElementById('carousel-track');
        track.innerHTML = ''; 
        currentAphroditeIndex = 0;

        let allPhotos = Array.from({length: 86}, (_, i) => i + 1);
        
        allPhotos.sort(() => Math.random() - 0.5);
        allPhotos.slice(0, 85).forEach(num => {
            const img = document.createElement('img');
            img.className = 'carousel-slide';
            img.src = `aphrodite/photo${num}.jpg`; 
            track.appendChild(img);
        });
    }

    function moveCarousel(direction) {
        const track = document.getElementById('carousel-track');
        const slides = document.querySelectorAll('.carousel-slide');
        
        currentAphroditeIndex += direction;

        if (currentAphroditeIndex < 0) currentAphroditeIndex = slides.length - 1;
        if (currentAphroditeIndex >= slides.length) currentAphroditeIndex = 0;

        const moveAmount = -currentAphroditeIndex * 100;
        track.style.transform = `translateX(${moveAmount}%) rotateX(5deg)`;
    }

    function enterLibrary() {
        document.getElementById('portals-screen').classList.remove('visible');
        setTimeout(() => {
            document.getElementById('library-screen').classList.add('visible');
            const container = document.getElementById('books-container');
            container.innerHTML = '';
            
            function createShelf(count, category) {
                container.style.display = 'flex';
                container.style.justifyContent = 'center';
                container.style.alignItems = 'flex-end';
                container.style.flexWrap = 'wrap';

                for(let i = 0; i < count; i++) {
                    const book = document.createElement('div');
                    book.className = 'book';
                    
                    book.style.height = (150 + Math.random() * 30) + 'px';
                    book.style.width = '40px'; 
                    
                    const tilt = (Math.random() * 10 - 5);
                    book.style.transform = `rotate(${tilt}deg)`;
                    
                    // Generate a random vibrant color for each book
                    const randomColor = `hsl(${Math.floor(Math.random() * 360)}, 60%, 50%)`;
                    book.style.backgroundColor = randomColor;
                    
                    book.onclick = () => openLetter(i + 1, category);
                    container.appendChild(book);
                }
            }

            createShelf(9, 'works');
        }, 500);
    }

    function openLetter(num, category) {
        const overlay = document.getElementById('letter-overlay');
        const img = document.getElementById('letter-image');
        img.src = `library/${category}/msg (${num}).jpg`; 
        overlay.style.display = 'flex';
    }
    function closeLetter() {
        document.getElementById('letter-overlay').style.display = 'none';
    }


    let currentPages = []; 
    let currentPageIndex = 0;

    function openLetter(num, category) {
        const overlay = document.getElementById('letter-overlay');
        const display = document.getElementById('page-display');
        
        if (category === 'works') {
            currentPages = myWritings[num - 1] || ["Page 1: Empty"];
            currentPageIndex = 0;
            renderPage();
        }
        overlay.style.display = 'flex';
    }

    function renderPage() {
        document.getElementById('page-left').innerText = currentPages[currentPageIndex] || "";
        document.getElementById('page-right').innerText = currentPages[currentPageIndex + 1] || "";
    }

    function changePage(direction) {
        currentPageIndex += direction;
        if (currentPageIndex < 0) currentPageIndex = 0;
        if (currentPageIndex >= currentPages.length) currentPageIndex = currentPages.length - 2;
        renderPage();
    }

                "Dia: the poet, coffee rings on notebooks, bad posture from a heavy bag, reading for hours together, dreaming of a love that makes her write till her hands give out, 'sleep is for the weak', not knowing who you are, always looking for the right word, never being able to speak up\n\nEllie: the artist, the bird in the cage, the 'ingénue', the incapable of love, shutting yourself in for days on end to finish a piece, the pretentious and the uptight, stained hands stained face stained clothes, tea, more paint than pens\n\nRo: the performer, the revolutionary, the loudest in the room, reciting shakespeare like a second language, hours spent memorizing lines, absorbing, papers everywhere, rebelling against authority, 'rules were made to be broken', wanting someone you can't have",
                "Since 1976, Stellifer Girls' Academy has been the leading (SCRATCHED: shittiest) institution for education in the country. Housed in Alderwood Valley and founded by Sir Reagan O'Connaughan (SCRATCHED: ROBIN MILLER), its campus sprawled over 120 acres of lush greenery (SCRATCHED: old buildings), unique teaching methodology (SCRATCHED: dickwad professors) and emphasis on the arts and academia (SCRATCHED: emphasis on slutshaming its students) separate it from other educational institutes in the area.\n\n(IN RED INK) Stellifer Girls' Academy is RULED by the five most awesome young ladies to walk its halls; Robin (that's me) Miller, Vienna Ardley, Eleanor Roosevelt (SCRATCHED: Rothschild), Charlie Dawson, and Dia Ruby Joan. They're sexy, smart and legendary.\n\n(IN BLUE INK) Stop vandalizing the school brochures in the library, Ro. Lola won’t stop telling me off for it. - Vienna\n\n(IN RED INK) I'll stop vandalizing this shit when tomorrow comes.\nHOUSES:\n· LEO: For the brave, the loyal, the fierce, the performing arts [GOLD, MAROON]\n· SIRIUS: For the bright, the witty, the virtuous, the literary arts [NAVY, GREY]\n· CORVUS: For the solemn, the dedicated, the perfectionists, the visual arts [WINE, WHITE]\n· LYRA: For the problem-solvers, the collected, the patient, the musical arts [BRONZE, CREAM]\n· ARA: For the intelligent, the curious, the restless, the sciences [BROWN, GREEN]\nCURRICULUM:\n· ACADEMIC COURSES:\no English Literature\no Shakespearean Literature\no Renaissance Art & Literature\no Greek & Roman Classics\no Philosophy\no European History",

                "o Society of Divination\n· COMMITTEES:\no Christmas Masquerade Committee\no Student Council\no Theatrical Presentation Committee\nPLOT OUTLINE:\nIntroduction to characters\nRomeo & Juliet\n· Audition\n· Ellie meets Richard\n· Robin is cast alongside Hyewon\n· Robin and Hyewon explore a relationship\nMidterms\n· Hyewon stops talking to Robin\n· Ellie begins reciprocating Richard’s feelings\n· Dia meets Azrael, they become friends\n· Charlie flunks her midterms\n· Vienna begins feeling left out, isolates herself\nChristmas Masquerade\n· Romeo & Juliet is presented\n· Robin finds out Hyewon is dating another boy\n· Hyewon exposes Robin as a lesbian\n· Dia and Azrael have a cute liddol dance <3\n· Richard ghosts Ellie",
                "· Charlie shows up high, but they find coke in her dorm\n· Vienna doesn’t speak up for any of them, leaves to be alone\nWinter Break\n· Charlie is under investigation by school authorities and the police, is almost expelled\n· Ellie swears off of ever seeing Richard again, dedicates her time to helping Charlie\n· Robin wants to help, but is in despair as she’s ridiculed by the students and staff while the management tells her to keep quiet about it\n· Dia and Azrael get closer trying to help Charlie\nSecond Sem\n· Charlie finds out that Harper Martinez snuck into the staff office after her music theory paper\n· Robin contemplates leaving Stellifer\n· Ellie and Richard reconcile, since apparently his father doesn’t approve of him being with her but he fought for them and got approval\n· Vienna sneaks around and finds Martinez dumping coke into the pond on school grounds\n· Charlie is proven innocent\n· Dia realizes she hasn’t paid attention to what her friends were going through, taking some space from Azrael to help Robin through\nThe Movement\n· To encourage queer acceptance at Stellifer, Vienna begins a movement in Robin’s name\n· The Principal quits :D since Richard’s father, the Chairman, fires him!!!!\n· They all live happily ever after\n\nEllie x Richard (Grumpy X Sunshine)",
                "Robin’s situationship and queerness\nDia x Azrael (she fell first, he fell harder)\nCharlie gets framed?\nVienna starts a revolution thingy against the school authorities",
                "Chapter One\nEvery student at Stellifer Girls’ Academy is reminded constantly of the legacy held by the women who have walked its halls since 1976; their names on the tongues of every girl who reads the engravings on the walls, used as passwords to dormitories, as study material, as examples of the standard they must live up to.\n\nFirst, there was the Class of ’77, known for their contribution to the beginning of an institution celebrated like Stellifer. Then, the Meringue Girls from the House of Leo (legend has it they snuck into the castle kitchen in senior year to bombard the House of Corvus with meringue cookies). There was Cynthia Mandel, the first graduate from Stellifer to win an Oscar (though, not the only one). There was Haein Lee, School Captain from ’88 to ’89 who became a tyrant in the eyes of the students and a savior in the eyes of the professors. Josephine Nguyen began the tradition of the Christmas Masquerade in 1994.\nAnd, of course, there were those five.\n\nWhile we’d earned many names, none of them really stuck 7 years into being a ‘sisterhood’. And so, we’re simply called ‘those five’.\n\n“Good god, Ro, you do not need to recite your lines at the top of your voice at 12 A.M.” Vienna sets out an exasperated groan, desperately scrawling words and numbers onto the parchment laid out on her desk. A dark mahogany, her hair seems to blend with the wood when she lays her head down, frustrated.\n\n“If I screw up this audition, Vie, my dream of playing Romeo will be over. Do you know how hard it has been convincing Joanne to finally, finally let us do this?” Robin’s coarse voice echoes through the room. Evidently unaware that some of us are making attempts to sleep, the two continue to bicker like usual.\n\nEleanor stirs in her sleep next to me, our beds so close that they may as well be joined at the hip. I reach out to my bedside table blindly, flicking the switch to turn on the lamp. “Hey, sorry for interrupting your duel, but I’ve got a really long day tomorrow. Could you do this in the morning?” I scowl.",
                "“Wow, you too? It’s like you guys want me to lose the role to Carnegie.” As she begins her tantrum, Vie plugs in her earphones and continues to work on her lecture material. I turn over in bed, shut my lamp off, and hope for the best.\n\nArriving at an elite boarding school at the ripe age of 11, sent from the depths of New Jersey on a scholarship, Diana Malik was scared and nervous and anything in between. What would the rich girls say? Are they like those mean girls in the movies? Then, of course, Robin Miller stretched her hand out in an act of camaraderie, three other girls by her side.\n\nAt breakfast the following morning, Ro continued her caffeine-induced crusade against what Shakespeare’s enthusiasts would have considered socially acceptable in theatre. The rest of us, sprawled on our chairs, picked apart at some version of toast. Charlie liked hers with all the marmalade in the world, but Ellie ate it plain. Vienna has it with strawberry jam. I don’t fancy toast all too much, though it’s better with peanut butter.\n\n“I need you to read Benvolio.” Ro thrusts a script into my hands, still sticky from the food. “Aw, man. Whatever. Just read.” And so I do.\n\n“Be ruled by me. Forget to think of her.” I read from the text splayed in front of me, turning to face her as she continues. “Oh, teach me how I should forget to think!”\n\n“By giving liberty unto thine eyes. Examine other beauties.”\n“’Tis the way to call hers, exquisite, in question more. These happy masks that kiss fair ladies’ brows,\n Being black, puts us in mind they hide the fair.\n He that is strucken blind cannot forget\n The precious treasure of his eyesight lost.\n Show me a mistress that is passing fair;\n What doth her beauty serve but as a note\nWhere I may read who passed that passing fair?\n Farewell. Thou canst not teach me to forget.”",
                "Robin finishes, earning a small applause from Charlie. “Don’t you sound like the man of the hour?” She sniggers, and I hand the stained script back to Ro, half-heartedly having attempted to wipe off the brown smear. “Aren’t I the man of the hour?” Robin pulls back her chair and plops herself onto it, slipping down into an awkward bend. “You two better show up to the audition,” she points at Charlie and me. “I’ll have your heads if you don’t. Can’t do much about these two prissy ladies, but at the very least, come watch.”\n\n“I’ll be there, yeah.” I take another bite out of the toast, flipping through ‘The Trial’ for the millionth time. It was much like Vienna and Eleanor to begin the school year with endless hours of work; Vienna would scramble from place to place to match her many commitments, and Ellie would shut herself in for days on end to finish her pieces. Charlie floated around a bit; she’d work when she felt like it. If something struck me, I had to work on it then and there. Ro did whatever she wanted. Ro always did whatever she wanted.\n\nThere’s a certain beauty in growing up surrounded by girls your age; girls who match your intellect, your ego, your imagination, and your vanity. People you can have a girlhood with. You fight, and you make up, and you fight again. When you live amongst these girls, there are times when you have to put your own struggles aside to comfort the girl who just got her heart broken; there are times when you have to forget your own bad grade to help the girl who needs a tutor. You come together for your common hatred of authority, you push each other apart for your common hatred of each other’s worst selves. And so, you give up on your own artistic pursuits to support a friend in need.\n\nThe audition itself was later in the afternoon, during prep time. Stellifer was vehemently particular about the hours the students put into their coursework. Classes began at 8 and ended at 3. Prep was from 4 to 7. No shocker was it that people who felt their daughters were put on Earth to cause trouble sent them here with the resolve to ‘cure’ them of rebelliousness.\n\nI pushed the heavy door to the auditorium open, finding a brightly illuminated, yet plain stage and an audience of some twenty students and teachers. Joanne, the Head of Theatrics was seated right up front with the rest of the department. A girl",
                "on stage attempted Juliet. Students queued up next to the stairs, and I caught the stare of Robin. She smiled and waved. I smiled and gave her a thumbs up. In the crowd, Charlie waved at me, ushering me to sit with her.\n\n“Our champ is up next.” She splays out further on the chair in a manner that the O’Connoughans would find utterly distasteful. I take the chair by her side, crossing my legs and waiting for Joanne (fondly, Joasswipe) to call Robin up. When she does, Robin sprints to the stage and takes the center. “Of course, you’re here too.” Joanne groans loudly; her voice was thick enough on its own to reverberate even in the back.\n\n“Yes, yes. My name is Robin Miller, House of Leo, third year student. I’ll be auditioning for Romeo.” She blurts, almost intelligible in her speech. Joanne seems to catch it well enough, perhaps because she hates her enough to remember her name.\n\nAs Robin performs the part we rehearsed this morning, I imagine the scowl on Joanne’s face, alongside the bright smiles of the other teachers. Ro is a hit or miss; you love her, or you hate her, or you do both. When she’s done, there’s a small round of applause. She bows, and comes off stage to sit next to us. “Hey, tiger. Good job up there.” Charlie gives her a high five, snacking on chips, otherwise known as contraband.\n\n“Damn right, I was good. What’d you think, Dia?” She turns to me, sitting to my left. “You’re always good, Ro. You know it. Carnegie won’t get that role over you. And Joasswipe might hate you, but she knows nobody will do it better than you will.” I push her brown hair behind her ear, but it doesn’t hold. She cut it last year with kitchen scissors that Charlie snuck in, just to piss off her parents when she went home for Christmas.\n\nJoanne took the stage, finally, after what felt like hours of hearing the same few lines over and over again. God bless Shakespeare, but everything gets repetitive when it’s as cliché as Romeo and Juliet. “Good evening, students. Before I announce the decisions we’ve made as the Department of Theatrics, I would like to express how utterly disappointed I am with the second years for their lack of",
                "improvement. The performing arts are no joke, and we certainly do not find your performances funny here at Stellifer. Last year, you were nobodies. This year, you are still nobodies. Dare you disgrace my name during the final production in front of the upper management, and I will have your heads on a pike.”\n\nCharlie snorts, choking on the chip in her mouth. Robin smiles, trying her level best not to let out a sound to avoid Joanne from hearing. She rolls her eyes and continues. “We’ll have Hyewon Jung playing Juliet, and Robin Miller playing Romeo-”\n\nCharlie lets out a loud whistle, and Robin and I watch in amusement as Joanne’s nostrils flare. “Maintain the sanctity of this auditorium or so help me God will I set it on fire with everyone inside. Pauline Keating will play Friar Lawrence, Sneha Sharma will play the Nurse, Magnolia Carnegie will play Tybalt, Wren Joseph will play Benvolio..” And as she went on with the list, Robin clutches my hand so tight her knuckles pale. “Told you so.” I whisper, a smile on our faces.",
                "Chapter Two\nVienna is pacing again. It’s not out of the ordinary to watch her pace in the dorm, especially since it’s rather spacious in spite of the desk sets and the beds. She needs to walk a lot, even though she claims otherwise, and when she can’t walk she needs to move in one way or another. It wasn’t a surprise to anyone when she came back to school in third year with a brand new diagnosis of anxiety and a bottle of pills.\n“I hope you know you can tell me what’s wrong?” I look to inform her. She ignores me outright, heading straight to her desk and the myriad papers sprawled out over it. “Vie, you can’t ignore me forever,” I stand up and walk to her. “Would you please just tell me why you’re walking around like you’re Napoleon and there’s nothing left to do?”\n“You think this is funny, Dia?” She deadpans. I smile. “No, which is why I’m asking you what’s wrong. Was that wrong of me to do, darling?”"

            "what instagram doesn't understand about Zindagi Na Milegi Dobara (2011)", "There are few self-proclaimed cinephiles in India who haven’t watched Zindagi Na Milegi Dobara (2011). Its stunning visuals, loveable characters and the sense of lust for life it invokes are features that have solidified its place in the halls of fame of Bollywood history.\nBut there are also concerns that echo among people on Instagram, particularly surrounding the plot. I have heard endless discourse with the same sentiment— 'Natasha was right! Kabir was an embarrassing man-child, and her actions were justified.' It truly makes me wonder if media literacy today is in such an egregious state that this is all that people could derive from this gem of a movie.",
                "The movie explores a wide variety of themes that fall under similar umbrellas; love for life, friendship, living in the moment, relationships, marriage and fear. The moral of Natasha and Kabir’s story that people miss is that it was a clear reflection of why relationships in the real world don’t work out— because people want different things.\nNatasha is controlling, while Kabir is incredibly non-confrontational, setting the stage for miscommunication with such effortlessness! While Natasha seems to have trust in Kabir at first, this trust fades into anxiety and envy once she begins suspecting that her friends were right.",
                "Kabir’s lack of will to confront Natasha and stand up for himself poisoned the relationship when he dragged himself into an engagement because he wanted to make her happy. Natasha’s bossy nature driven by her fear of losing Kabir reinforces the belief that this will continue after marriage.\nThe simple truth is that in relationships, people want different things. Natasha’s take on marriage assumed that your life exists as a hierarchy. Kabir sees life as a mindmap; marriage exists on the map, but it’s not the centre. That doesn’t make him an 'emotionally cheating man-child' or her a 'bossy control freak'.",
                "The movie acknowledges this in the end-credits music video, where Kabir and Natasha are shown to have gone their separate ways—and they’re both happy. It puts up a strong argument for the case that had things not turned out the way they did, their relationship would crash and burn far more miserably.\nOne of my favorite set of scenes in Bollywood of all-time are the underwater diving scenes. Sharing the same device to breathe is inherently something that builds tension, but to explore the marvels of life together underwater, hand-in-hand— that is a whole other level of romance.",
                "This scene is pivotal for Arjun’s character— a man whose sole purpose for spending the rest of his life was slaving away for his retirement fund. The diving scene slows his life down, and his character development by the end of the movie is unmistakable.\nThen there’s Imran. Imran is known mostly for embodying exactly what the movie preaches— Carpe Diem. But beneath that lies an emotionally sensitive man who’s just trying to find the reason why his father left. The arc between Imran and his biological father is a story of abandonment and revelations.",
                "Salman, his father, just didn't want kids. Rahila, Imran’s mother, did— so he left. This harsh reality leaves Imran in tears, but he realizes this really was for the best. The fact that Salman didn’t feel the void of parenthood stung, but it meant more than a meaningless apology.\nOn a side note, the cinematography for this movie is stunning. The vibrant contrast sets the tone for a satisfying, happy conclusion. This doesn’t even scratch the surface of what I could say about this movie, but here’s to understanding media better than our skewed ideals of relationships."
